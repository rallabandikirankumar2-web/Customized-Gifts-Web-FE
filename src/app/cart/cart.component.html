<ng-container *ngIf="products.length!=0">
<div class="container" >
    <div class="card-table">
        <div class="cart-product">
            <table class="table table-responsive" >
                <thead>
                    <tr >
                        <th style="padding-right: 110px;">Product ID</th>
                        <th style="padding-right: 110px;">Product Name</th>
                        <th style="padding-right: 110px;">Product Image</th>
                        <th style="padding-right: 110px;">Price</th>
                        <th style="padding-right: 110px;">Quantity</th>
                        <th style="padding-right: 110px;">Total</th>
                        <th style="padding-right: 110px;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of products">
                        <td>{{item.id}}</td>
                        <td>{{item.name}}</td>
                        <td><img src="{{item.imgsrc}}" style="width: 150px;height: 150px;" ></td>
                        <td>{{item.price}}</td>
                        <td>{{item.quantity}}</td>
                        <td>{{item.total}}</td>
                        <td>
                            <button (click)="removeItem(item)"   class="btn btn-danger"><i class="fas fa-trash"></i></button>
    
                        </td>
                    </tr>
                    <tr>
                        <td colspan="4"></td>
                        <td><button (click)="emptycart()"  class="btn btn-danger">Empty Cart</button></td>
                        <td><button  routerLink="/wedding"  class="btn btn-primary">Shop More</button></td>
                            <td><button routerLink="/payment"  class="btn btn-success">Check Out</button></td>
                            <td><strong>Total Amount:₹{{grandTotal}}</strong></td>
                        
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</ng-container>




<ng-container *ngIf="products.length==0 ">
    <div class="container">
        <div class="card">
            <h5 class="card-title">My Cart</h5>
        </div>
            <div class="center">
                <img src="assets/Images/cart1.png" alt="">
                <h4>Your cart is Empty!</h4>
                <h6>Add Items</h6>
                <button routerLink="/couples" type="button" class="btn btn-primary">Shop Now</button>
    
        </div>
    
    </div>
</ng-container>
