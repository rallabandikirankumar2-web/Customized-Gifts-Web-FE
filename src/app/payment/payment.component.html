
<div>
    <body>
        <div class="bg"></div>
        <div class="bg bg2"></div>
        <div class="bg bg3"></div>
        <div class="content" style="margin-left: 500px;margin-top: 50px;font-family: sans-serif;">
            <div class="card" id="1" style="width: 35rem;">
                <div class="card-body" id="2">
                    <h2 class="card-title" style="text-align: center;"><b>Garden Of Gifts</b></h2>
                    <p class="card-text">Welcome to the Payment gateway of Garden of Gifts. Please select paynow option below 
                        to continue with your Payment.
                    </p>
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">
                        <h5><b>Name :</b> {{users.firstName}} {{users.lastName}}</h5>
                    </li>
                    <li class="list-group-item">
                        <h5><b>Mail : </b>{{users.emailId}}</h5>
                    </li>
                    <li class="list-group-item">
                        <h5><b>Phone : </b>{{users.mobileNumber}}</h5>
                    </li>
                </ul>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">
                        <h5>Total Amount: ₹{{finalAmount}}</h5>
                    </li>
                </ul>
                <div class="card-body" id="3">
                    <button class="btn btn-danger" routerLink="/cart" style="font-size: 25px;">Go Back</button>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                    <button class="btn btn-success" (click)="pay(finalAmount*100)" style="font-size: 25px;">Pay 💳
                    </button>
                    <!-- <img
                        src="https://freight.cargo.site/w/480/i/4fd4bbf6ff2b0aecae7a5ca877582f26b366b88af7c6e9a1cecf03b03b3dfbea/giphy-2.gif"
                        width="20%"> -->
                </div>
            </div>
        </div>
    </body>
    </div>
